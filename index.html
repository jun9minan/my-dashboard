<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합 대시보드 - 다이어리 & 가계부</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 헤더 -->
        <header class="header">
            <div class="header-left">
                <h1>Dashboard</h1>
            </div>
            <div class="header-right">
                <button class="theme-toggle" id="themeToggle" title="다크/라이트 모드 전환">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </header>

        <!-- 메인 컨텐츠 -->
        <main class="main-content">
            <!-- 1행: 날씨 + 증시 -->
            <div class="grid grid-2">
                <!-- 날씨 -->
                <div class="card weather-card">
                    <div class="card-header">
                        <h2>날씨</h2>
                    </div>
                    <div class="card-body">
                        <div class="weather-icon">☀️</div>
                        <div class="weather-info">
                            <p class="temperature">25°C</p>
                            <p class="location">서울</p>
                        </div>
                    </div>
                    <button class="card-action">상세</button>
                </div>

                <!-- 미국 증시 -->
                <div class="card market-card">
                    <div class="card-header">
                        <h2>미국 증시</h2>
                    </div>
                    <div class="card-body">
                        <div class="market-item">
                            <span>S&P 500</span>
                            <span class="positive">+0.45%</span>
                        </div>
                        <div class="market-item">
                            <span>나스닥</span>
                            <span class="positive">+1.23%</span>
                        </div>
                        <div class="market-item">
                            <span>다우존스</span>
                            <span class="negative">-0.12%</span>
                        </div>
                    </div>
                    <button class="card-action">상세</button>
                </div>
            </div>

            <!-- 2행: To do list -->
            <div class="card todo-card">
                <div class="card-header">
                    <h2>오늘의 할 일</h2>
                </div>
                <div class="card-body">
                    <div class="todo-item completed">
                        <input type="checkbox" checked>
                        <span>아침 산책</span>
                    </div>
                    <div class="todo-item">
                        <input type="checkbox">
                        <span>프로젝트 계획 작성</span>
                    </div>
                    <div class="todo-item">
                        <input type="checkbox">
                        <span>회의 참석</span>
                    </div>
                </div>
                <button class="card-action">전체보기</button>
            </div>

            <!-- 3행: 일정 -->
            <div class="card schedule-card">
                <div class="card-header">
                    <h2>일정</h2>
                </div>
                <div class="card-body">
                    <div class="schedule-item">
                        <div class="schedule-date">오늘</div>
                        <div class="schedule-events">
                            <p>14:00 - 팀 미팅</p>
                            <p>18:00 - 운동</p>
                        </div>
                    </div>
                    <div class="schedule-item">
                        <div class="schedule-date">내일</div>
                        <div class="schedule-events">
                            <p>10:00 - 클라이언트 회의</p>
                        </div>
                    </div>
                </div>
                <button class="card-action">전체보기</button>
            </div>

            <!-- 4행: 메모 + 재무현황 -->
            <div class="grid grid-2">
                <!-- 메모 -->
                <div class="card memo-card">
                    <div class="card-header">
                        <h2>최근 메모</h2>
                    </div>
                    <div class="card-body">
                        <div class="memo-preview">
                            <p class="memo-title">프로젝트 아이디어</p>
                            <p class="memo-text">새로운 대시보드 프로젝트 시작...</p>
                        </div>
                    </div>
                    <button class="card-action">전체보기</button>
                </div>

                <!-- 재무현황 -->
                <div class="card finance-card">
                    <div class="card-header">
                        <h2>재무 현황</h2>
                    </div>
                    <div class="card-body">
                        <div class="finance-item">
                            <span>이번 달 수입</span>
                            <span class="amount">4,500,000원</span>
                        </div>
                        <div class="finance-item">
                            <span>이번 달 지출</span>
                            <span class="amount negative">-1,250,000원</span>
                        </div>
                        <div class="finance-item summary">
                            <span>순 저축</span>
                            <span class="amount">3,250,000원</span>
                        </div>
                    </div>
                    <button class="card-action">상세</button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
